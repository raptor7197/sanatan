services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: consultation
      POSTGRES_PASSWORD: consultation
      POSTGRES_DB: consultation
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U consultation']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://consultation:consultation@db:5432/consultation
      JWT_SECRET: dev-only-secret-change-me-32-chars-min
      PORT: 3000
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node src/server.js"

volumes:
  db_data:
